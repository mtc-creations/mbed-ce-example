buildType:
  default: Debug
  choices:
    Develop:
      short: Develop
      long: Emit debug information but also optimize
      buildType: Develop
    Debug:
      short: Debug
      long: Emit debug information and don't optimize
      buildType: Debug
    Release:
      short: Release
      long: Optimize generated code
      buildType: Release
board:
  # Fill name of your target, which has to correspond to
  # the target name in targets.json5 file or custom_targets.json5 in case of custom target.
  # Basically just replace every occurrence of YOUR_MBED_TARGET with Mbed target name.
  # For example LPC1768 or NUCLEO_L452RE_P
  default: Nucleo64_F446RE # default variant (choose) from below
  choices:
    Nucleo64_F446RE:
      short: Nucleo64_F446RE
      settings:
        MBED_TARGET: NUCLEO_F446RE # Your mbed target name from targets.json5 file
        # For more visit - https://mbed-ce.dev/upload-methods/
        UPLOAD_METHOD: STM32CUBE
    Nucleo32_L432KC:
      short: Nucleo32_L432KC
      settings:
        MBED_TARGET: NUCLEO_L432KC
        UPLOAD_METHOD: STM32CUBE
    Nucleo64_L476RG:
      short: Nucleo64_L476RG
      settings:
        MBED_TARGET: NUCLEO_L476RG
        UPLOAD_METHOD: STM32CUBE
