# CI workflow for the Mbed CE project.
# Two jobs:
#   firmware-build  — cross-compiles for both STM32 targets using the ARM GNU toolchain
#   desktop-tests   — native build with GCC/Clang/MSVC, runs Catch2 unit tests

on:
  pull_request:
    types:
      - opened
      - synchronize
      - ready_for_review

name: CI

jobs:
  firmware-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout (shallow)
        uses: actions/checkout@v6
        with:
          submodules: false
          fetch-depth: 1

      - name: Checkout submodules (shallow)
        run: git submodule update --init --recursive --depth 1

      - name: Setup CMake
        uses: lukka/get-cmake@latest
      - run: cmake --version

      - name: Install ARM GNU Toolchain
        uses: carlosperate/arm-none-eabi-gcc-action@v1
        with:
          release: "15.2.Rel1"
      - run: arm-none-eabi-gcc --version

      - name: Install python3-venv
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-venv

      # upload method is set to NONE in the presets, so that the build will succeed in the cloud even without the required tools for flashing
      - name: Build NUCLEO_F446RE
        run: |
          cmake --preset N64_F446RE-Debug -DUPLOAD_METHOD=NONE
          cmake --build --preset N64_F446RE-Debug

      - name: Build NUCLEO_L432KC
        run: |
          cmake --preset N32_L432KC-Debug -DUPLOAD_METHOD=NONE
          cmake --build --preset N32_L432KC-Debug

  desktop-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout (shallow)
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Setup CMake
        uses: lukka/get-cmake@latest
      - run: cmake --version

      - name: Configure
        run: cmake --preset desktop-tests

      - name: Build
        run: cmake --build --preset desktop-tests

      - name: Run tests
        run: ctest --preset desktop-tests
